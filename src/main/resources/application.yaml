server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/messenger_db
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

    datasource:
      hikari:
        connection-timeout: 30000
        maximum-pool-size: 10


  server:
    port: 8080

  devtools:
    restart:
      enabled: true